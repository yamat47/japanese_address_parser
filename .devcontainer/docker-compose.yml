version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
      args:
        RUBY_VERSION: ${RUBY_VERSION:-3.4}
        NODE_VERSION: ${NODE_VERSION:-20}
    volumes:
      - ..:/workspace:cached
      - bundle-data:/usr/local/bundle
      - node-modules:/workspace/node_modules
    command: sleep infinity
    environment:
      - LANG=C.UTF-8

volumes:
  bundle-data:
  node-modules:
